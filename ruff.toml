# Match the scraper/api repos so ruff (check + format) behaves consistently and
# `ruff format` doesn't reformat the vendored copies (it defaults to 88 chars
# otherwise, which would diverge them from the canonical scraper repo).
line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["UP017", "UP037"]

# The manual research probes embed long JS-regex string literals (can't be
# line-wrapped) and inline percent-format — scope those off rather than mangling
# the embedded JS.
[lint.per-file-ignores]
"american_mint_probe.py" = ["E501", "UP031"]
"gflights_probe.py" = ["E501"]
