name: gflights-probe

# One-shot datacenter-IP feasibility probe (manual only). Google Flights = CASH fares.
# A residential headful Chrome scrapes it cleanly; the open question is whether GH Actions /
# Azure IP gets results or an "unusual traffic" interstitial. Headful Chrome under xvfb.
# Inspect the uploaded screenshot artifact + the job log verdict. Writes NOTHING to MotherDuck.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Probe Google Flights (headful Chrome under xvfb, Azure IP)
        run: xvfb-run -a python gflights_probe.py
      - name: Upload screenshot + html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gflights-probe-artifacts
          path: |
            /tmp/gflights_probe.png
            /tmp/gflights_probe.html
          if-no-files-found: warn
