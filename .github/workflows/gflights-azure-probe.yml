name: gflights-azure-probe

# One-off probe: does Google Flights serve our headful-Chrome cash scraper from a GitHub-Actions
# (Azure) IP, or wall it (consent / "unusual traffic" / CAPTCHA)? Gates whether the cash scraper
# can move off Fly onto sharded GH Actions like the award scrapers. READ-ONLY (writes no DB rows).
# Reuses the same prebuilt container + headful-Chrome-under-xvfb setup as the award browser
# scrapers, and the real GoogleFlightsScraper (vendored byte-identical from points-pilot-scrapers).
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: gflights-azure-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/louie2074/points-pilot-jobs-scraper:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --shm-size=2g
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      # Separate fast step so the shipped versions + whether the pin applied flush to a readable
      # log even if the scrape step hangs. The :latest image's scraper-package floating dep can win
      # over requirements.txt and pull websockets>=15, which crashes nodriver's listener under heavy
      # evaluate() polling; force the known-good 14.x line. Persists into the next step (same job
      # container). The real migration rebuilds the image with this pin baked in.
      - name: Env + pin websockets (fast — gives version truth)
        run: |
          python -c "import websockets, nodriver; print('VERSIONS before: websockets', websockets.__version__, '| nodriver', nodriver.__version__)"
          pip install --no-cache-dir 'websockets>=14,<15'
          python -c "import websockets; print('VERSIONS after: websockets', websockets.__version__)"
      - name: Probe Google Flights (headful Chrome under xvfb, Azure IP)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: xvfb-run -a python gflights_probe.py
