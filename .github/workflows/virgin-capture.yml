name: virgin-capture
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Capture Virgin Atlantic award flow (headful Chrome under xvfb, Azure IP)
        run: xvfb-run -a python -u virgin_capture.py
      - name: Upload capture + screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: virgin-capture
          path: |
            cap_virgin_full.json
            cap_virgin_net.json
            cap_virgin_results.html
            cap_virgin_widget.html
            virgin_*.png
          if-no-files-found: ignore
