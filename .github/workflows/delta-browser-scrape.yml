name: delta-browser-scrape

# Delta browser scrape, run entirely within this repo (GH Actions / Azure IP clears Delta's
# Akamai edge block — HTTP 200 — where Fly's IP gets 444). The scrapers/ config/ db/ pipeline/
# packages are VENDORED from points-pilot-scrapers (see VENDORED_DELTA.md), so no cross-repo
# checkout / PAT is needed. Headful Chrome under xvfb (Akamai challenges headless). Writes Delta
# rows into MotherDuck `flights`.
on:
  workflow_dispatch:
    inputs:
      origin:
        description: "Origin IATA (single-route on-demand mode). Blank = popular-routes cron."
        required: false
        default: ""
      destination:
        description: "Destination IATA (single-route on-demand mode)."
        required: false
        default: ""
      dates:
        description: "Comma-separated ISO dates (YYYY-MM-DD). Blank = near-term window."
        required: false
        default: ""
  schedule:
    - cron: "0 8 * * *"   # daily at 08:00 UTC (clear of transfer-bonuses 09:00)

permissions:
  contents: read

concurrency:
  group: ${{ inputs.origin != '' && format('delta-ondemand-{0}-{1}', inputs.origin, inputs.destination) || 'delta-browser-scrape' }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 150   # ceiling (not runtime), headroom for the post-loop metric + heartbeat
    # Parallel runs on separate runner IPs split DELTA_ROUTES (stride-sharded), so each run stays
    # comfortably under Delta's per-session Akamai (444) ceiling (~27 directed legs — the live run
    # blocked on leg 28). 3 shards = ~9 pairs / ~18 legs each. On-demand single-route dispatch
    # still spawns all shards, but only shard 0 does the work.
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Scrape Delta (headful Chrome under xvfb, Azure IP)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
          DELTA_HEARTBEAT_URL: ${{ secrets.DELTA_HEARTBEAT_URL }}
          DELTA_SCRAPE_DAYS: "5"
          DELTA_SHARDS: "3"
          DELTA_SHARD_INDEX: ${{ matrix.shard }}
          DELTA_ROUTE_ORIGIN: ${{ inputs.origin }}
          DELTA_ROUTE_DEST: ${{ inputs.destination }}
          DELTA_ROUTE_DATES: ${{ inputs.dates }}
        run: xvfb-run -a python delta_browser_scrape.py
